baseURL = "https://portfolio.conall.dev/"
languageCode = "en-us"
title = "Conall O'Brien"
theme = "PaperMod"
[pagination]
pagerSize = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
disableXML = true
minifyOutput = true

[params]
env = "production"
title = "Conall O'Brien"
description = "Professional artifacts, writing, and projects by Conall O'Brien"
author = "Conall O'Brien"
defaultTheme = "auto"
disableThemeToggle = false
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false

[params.profileMode]
enabled = true
title = "Conall O'Brien"
subtitle = "Engineering, writing, and professional artifacts"
imageWidth = 120
imageHeight = 120

[[params.profileMode.buttons]]
name = "Posts"
url = "/posts"

[[params.profileMode.buttons]]
name = "Projects"
url = "/projects"

[[params.socialIcons]]
name = "github"
url = "https://github.com/conallob"

[[params.socialIcons]]
name = "linkedin"
url = "https://linkedin.com/in/conall"

[params.assets]
disableHLJS = false
disableFingerprinting = false

[params.label]
text = "Conall O'Brien"

[menu]

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "projects"
name = "Projects"
url = "/projects/"
weight = 20

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 40

[outputs]
home = ["HTML", "RSS", "JSON"]
